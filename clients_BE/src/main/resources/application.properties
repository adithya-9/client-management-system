spring.application.name=clients 

spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=0129
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=admins
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
# Secret key for signing JWT tokens (minimum 32 characters recommended)
# IMPORTANT: Change this to a secure random value in production
jwt.secret=your-super-secret-key-for-jwt-change-this-in-production-minimum-32-chars

# JWT token expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000